<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In Into Your Accaunt</title>
    <link rel="icon" type="image/svg+xml" href="/source/fork-and-knife.svg" />
    <link rel="stylesheet" href="/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Forum&family=Rubik+Marker+Hatch&family=Story+Script&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="forlog">
    <section class="heather">
      <div id="mobilenav" class="mobilenav">
        <ul>
          <li><a href="/index.html">Home</a></li>
          <li><a href="/index.html">Cart</a></li>
          <li><a href="/html/log.html">Log in</a></li>
        </ul>
      </div>
      <video autoplay muted loop playsinline>
        <source src="/source/introo.mp4" />
      </video>
      <svg
        class="fork"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 512 512"
      >
        <!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
        <path
          d="M63.9 14.4C63.1 6.2 56.2 0 48 0s-15.1 6.2-16 14.3L17.9 149.7c-1.3 6-1.9 12.1-1.9 18.2 0 45.9 35.1 83.6 80 87.7L96 480c0 17.7 14.3 32 32 32s32-14.3 32-32l0-224.4c44.9-4.1 80-41.8 80-87.7 0-6.1-.6-12.2-1.9-18.2L223.9 14.3C223.1 6.2 216.2 0 208 0s-15.1 6.2-15.9 14.4L178.5 149.9c-.6 5.7-5.4 10.1-11.1 10.1-5.8 0-10.6-4.4-11.2-10.2L143.9 14.6C143.2 6.3 136.3 0 128 0s-15.2 6.3-15.9 14.6L99.8 149.8c-.5 5.8-5.4 10.2-11.2 10.2-5.8 0-10.6-4.4-11.1-10.1L63.9 14.4zM448 0C432 0 320 32 320 176l0 112c0 35.3 28.7 64 64 64l32 0 0 128c0 17.7 14.3 32 32 32s32-14.3 32-32l0-448c0-17.7-14.3-32-32-32z"
        />
      </svg>
      <nav class="navforheather">
        <ul class="ul">
          <li><a class="anch" href="/index.html">Home</a></li>
          <li><a class="anch" href="/index.html">Cart</a></li>
          <li><a class="anch" href="/html/log.html">Log In</a></li>
        </ul>
      </nav>
      <div>
        <button id="burgerBtn" class="burgerBtn"></button>
      </div>
    </section>
    <section class="secforlog">
      <div class="buttons">
        <h2 id="regBtn">Registration</h2>
        <h2 id="signInBtn">Sign In</h2>
      </div>
      <form id="regForm" class="las hidden">
        <h1 class="log">REGISTER</h1>
        <input
          class="inp"
          type="text"
          id="regFirstName"
          placeholder="Enter Your Name"
          required
        />
        <input
          class="inp"
          type="text"
          id="regLastName"
          placeholder="Enter Your Last Name"
          required
        />
        <input
          class="inp"
          type="email"
          id="regEmail"
          placeholder="Enter Your Email"
          required
        />
        <input
          class="inp"
          type="password"
          id="regPassword"
          placeholder="Please Enter Your Password"
          required
        />
        <input
          class="inp"
          type="number"
          id="regNumber"
          placeholder="Enter Your Number"
          required
        />
        <input class="forsubmit" type="reset" id="regReset" value="Reset" />
        <input
          class="forsubmit"
          type="submit"
          id="regSubmit"
          value="Register"
        />
      </form>
      <form id="signInForm" class="loginp">
        <h1 class="log">SIGN IN</h1>
        <input
          class="inp"
          type="number"
          id="signInNumber"
          placeholder="Enter Your Phone Number"
          required
        />
        <input
          class="inp"
          type="password"
          id="signInPassword"
          placeholder="Enter Your Password"
          required
        />
        <input class="forsubmit" type="reset" id="signInReset" value="Reset" />
        <input
          class="forsubmit"
          type="submit"
          id="signInSubmit"
          value="Sign In"
        />
      </form>
    </section>

    <script src="../app.js"></script>
    <script src="../log.js"></script>
  </body>
</html>
